<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGTÜ Üçgen Bina | Kusursuz Navigasyon</title>
    <style>
        /* --- PRO TEMA & DEĞİŞKENLER --- */
        :root {
            --bg-color: #030712; 
            --panel-bg: rgba(17, 24, 39, 0.95); 
            --kgtu-green: #10B981; 
            --kgtu-orange: #F97316; 
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); 
            color: var(--text-main); height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* --- ÜST BİLGİ (HEADER) --- */
        .header {
            padding: 15px 20px; background: rgba(3, 7, 18, 0.9); 
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 1px; color: var(--text-main);}
        .header h1 b { color: var(--kgtu-green); }
        .live-status { font-size: 12px; display: flex; align-items: center; gap: 6px; color: var(--kgtu-orange); font-weight: bold;}
        .dot { width: 8px; height: 8px; background: var(--kgtu-orange); border-radius: 50%; box-shadow: 0 0 10px var(--kgtu-orange); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }

        /* --- HARİTA VE SVG ALANI --- */
        #map-area { 
            flex: 1; position: relative; overflow: hidden; 
            background: radial-gradient(circle at 50% 45%, #111827, #030712); 
        }
        
        .building-outline {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1000px; height: 700px; pointer-events: none; opacity: 0.4;
        }

        #routes, #simulation-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 700px; pointer-events: none; }
        #nodes-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 700px; }
        
        /* Noktalar */
        .node { 
            position: absolute; width: 14px; height: 14px; 
            background: var(--text-main); border-radius: 50%; 
            transform: translate(-50%, -50%); cursor: pointer; transition: 0.2s; z-index: 10;
            border: 2px solid var(--bg-color); box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }
        .node:hover { transform: translate(-50%, -50%) scale(1.5); background: var(--kgtu-green); box-shadow: 0 0 15px var(--kgtu-green); z-index: 20;}
        
        /* Özel Nokta Türleri */
        .node.elevator { background: #3B82F6; border-radius: 4px; width: 18px; height: 18px; border: 2px solid #FFF;} /* Asansörler Kare */
        .node.entrance { background: #EF4444; width: 18px; height: 18px; border-radius: 50%;} /* Girişler Kırmızı */
        .node.classroom { background: var(--kgtu-green); width: 12px; height: 12px; } /* Derslikler Yeşil */
        .node.academic { background: #A855F7; width: 14px; height: 14px; } /* Hocalar Mor */
        .node.special { background: var(--kgtu-orange); width: 16px; height: 16px; } /* Fuaye vs */

        .node-label { 
            position: absolute; font-size: 11px; background: rgba(17, 24, 39, 0.95); 
            padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
            transform: translate(-50%, 15px); white-space: nowrap; z-index: 11;
            color: #F3F4F6; font-weight: 500; pointer-events: none;
        }
        .node:hover + .node-label { background: var(--kgtu-green); color: #000; z-index: 21; border-color: #000; font-weight: bold;}

        /* Simülasyon İkonu */
        #sim-avatar {
            position: absolute; width: 28px; height: 28px; background: #FFF; 
            border-radius: 50%; transform: translate(-50%, -50%); display: none;
            box-shadow: 0 0 20px #FFF, 0 0 40px var(--kgtu-green); z-index: 50; 
            text-align: center; line-height: 28px; font-size: 16px;
        }

        /* --- ALT KONTROL PANELİ --- */
        .bottom-panel {
            background: var(--panel-bg); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-light); padding: 20px;
            z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.7);
        }

        .floor-tabs { display: flex; background: rgba(0,0,0,0.6); border-radius: 10px; padding: 5px; margin-bottom: 15px; border: 1px solid var(--border-light); gap: 5px;}
        .floor-tabs button {
            flex: 1; padding: 10px 5px; background: transparent; border: none; 
            color: var(--text-muted); font-weight: 600; font-size: 13px; border-radius: 6px; transition: 0.3s; cursor: pointer;
        }
        .floor-tabs button.active { background: var(--kgtu-green); color: #030712; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);}

        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        select {
            flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500;
            background: #1F2937; border: 1px solid rgba(255,255,255,0.1); color: white; outline: none;
            appearance: none; 
        }
        select:focus { border-color: var(--kgtu-green); }
        
        .action-btns { display: flex; gap: 10px; margin-top: 10px;}
        .btn { flex: 1; padding: 14px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s;}
        .btn-route { background: var(--kgtu-green); color: #030712; }
        .btn-route:hover { background: #059669; }
        .btn-sim { background: var(--kgtu-orange); color: #030712; display: none; }

        #directions-text { 
            margin-top: 15px; font-size: 13px; color: var(--text-muted); 
            line-height: 1.6; max-height: 100px; overflow-y: auto; 
            padding-right: 10px; border-left: 3px solid var(--kgtu-green); padding-left: 12px;
        }
        #directions-text b { color: var(--text-main); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KGTÜ <b>ÜÇGEN BİNA</b></h1>
        <div class="live-status"><div class="dot"></div> GPS AKTİF</div>
    </div>

    <div id="map-area">
        <svg class="building-outline" viewBox="0 0 1000 700">
            <polygon points="500,60 150,560 850,560" fill="rgba(16, 185, 129, 0.02)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="4"/>
            <polygon points="500,240 330,480 670,480" fill="rgba(3, 7, 18, 1)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>
            
            <polygon points="500,140 250,500 750,500" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="40" stroke-linejoin="round"/>
        </svg>

        <svg id="routes"></svg>
        <div id="nodes-container"></div>
        <div id="sim-avatar">🚶‍♂️</div>
    </div>

    <div class="bottom-panel">
        <div class="floor-tabs">
            <button class="active" onclick="changeFloor(0)" id="btn-f0">Zemin</button>
            <button onclick="changeFloor(1)" id="btn-f1">1. Kat</button>
            <button onclick="changeFloor(2)" id="btn-f2">2. Kat</button>
            <button onclick="changeFloor(3)" id="btn-f3">3. Kat (Hocalar)</button>
        </div>

        <div class="input-group">
            <select id="start"></select>
        </div>
        <div class="input-group">
            <select id="end"></select>
        </div>

        <div class="action-btns">
            <button class="btn btn-route" onclick="calculateRoute()">Rotayı Çiz</button>
            <button class="btn btn-sim" id="sim-btn" onclick="startSimulation()">▶ Simüle Et</button>
        </div>

        <div id="directions-text">Merkezde kafeler yoktur. Tüm derslik, laboratuvar ve ofisler üçgen koridorlar (ring) üzerine dizilmiştir.</div>
    </div>

<script>
    // --- BİREBİR ÜÇGEN KOORDİNATLARI (Tam Ring Sistemi) ---
    // A Köşesi: (500, 140)
    // B Köşesi: (250, 500)
    // C Köşesi: (750, 500)
    // Sol Kenar: (416, 260) ve (333, 380)
    // Alt Kenar: (416, 500) ve (583, 500)
    // Sağ Kenar: (666, 380) ve (583, 260)
    
    const locations = {
        // === ZEMİN KAT (f: 0) ===
        "Z_GirisA": { x: 500, y: 70, f: 0, name: "Kuzey Ana Giriş (A)", type: "entrance" },
        "Z_GirisB": { x: 180, y: 500, f: 0, name: "Güneybatı Girişi (B)", type: "entrance" },
        "Z_GirisC": { x: 820, y: 500, f: 0, name: "Güneydoğu Girişi (C)", type: "entrance" },
        
        "Z_AsansorA": { x: 500, y: 140, f: 0, name: "A Blok Asansörü (Kuzey)", type: "elevator" },
        "Z_AsansorB": { x: 250, y: 500, f: 0, name: "B Blok Asansörü (Sol Alt)", type: "elevator" },
        "Z_AsansorC": { x: 750, y: 500, f: 0, name: "C Blok Asansörü (Sağ Alt)", type: "elevator" },
        
        "Z_Amfi1": { x: 416, y: 260, f: 0, name: "Büyük Amfi 1", type: "classroom" },
        "Z_Amfi2": { x: 333, y: 380, f: 0, name: "Büyük Amfi 2", type: "classroom" },
        "Z_OgrenciIsleri": { x: 416, y: 500, f: 0, name: "Öğrenci İşleri" },
        "Z_Kutuphane": { x: 583, y: 500, f: 0, name: "Merkez Kütüphane" },
        "Z_Yemekhane": { x: 666, y: 380, f: 0, name: "Yemekhane" },
        "Z_Kantin": { x: 583, y: 260, f: 0, name: "Zemin Kantin" },
        "Z_Fuaye": { x: 500, y: 360, f: 0, name: "Zemin Fuaye", type: "special" }, // Sadece zeminde avlu geçişi var

        // === 1. KAT (f: 1) - DERSLİKLER 101-120 ===
        "K1_AsansorA": { x: 500, y: 140, f: 1, name: "A Blok Asansörü", type: "elevator" },
        "K1_D101_104": { x: 416, y: 260, f: 1, name: "Derslik 101-104", type: "classroom" },
        "K1_D105_108": { x: 333, y: 380, f: 1, name: "Derslik 105-108", type: "classroom" },
        "K1_AsansorB": { x: 250, y: 500, f: 1, name: "B Blok Asansörü", type: "elevator" },
        "K1_MBGLab1": { x: 416, y: 500, f: 1, name: "Derslik 109-112 (MBG Lab 1)", type: "classroom" },
        "K1_MBGLab2": { x: 583, y: 500, f: 1, name: "Derslik 113-115 (MBG Lab 2)", type: "classroom" },
        "K1_AsansorC": { x: 750, y: 500, f: 1, name: "C Blok Asansörü", type: "elevator" },
        "K1_D116_118": { x: 666, y: 380, f: 1, name: "Derslik 116-118", type: "classroom" },
        "K1_D119_120": { x: 583, y: 260, f: 1, name: "Derslik 119-120 (Lablar)", type: "classroom" },

        // === 2. KAT (f: 2) - DERSLİKLER 201-220 ===
        "K2_AsansorA": { x: 500, y: 140, f: 2, name: "A Blok Asansörü", type: "elevator" },
        "K2_D201_204": { x: 416, y: 260, f: 2, name: "Derslik 201-204", type: "classroom" },
        "K2_D205_208": { x: 333, y: 380, f: 2, name: "Derslik 205-208", type: "classroom" },
        "K2_AsansorB": { x: 250, y: 500, f: 2, name: "B Blok Asansörü", type: "elevator" },
        "K2_D209_212": { x: 416, y: 500, f: 2, name: "Derslik 209-212", type: "classroom" },
        "K2_D213_215": { x: 583, y: 500, f: 2, name: "Derslik 213-215", type: "classroom" },
        "K2_AsansorC": { x: 750, y: 500, f: 2, name: "C Blok Asansörü", type: "elevator" },
        "K2_D216_218": { x: 666, y: 380, f: 2, name: "Derslik 216-218", type: "classroom" },
        "K2_D219_220": { x: 583, y: 260, f: 2, name: "Derslik 219-220", type: "classroom" },

        // === 3. KAT (f: 3) - HOCALAR / AKADEMİK ===
        "K3_AsansorA": { x: 500, y: 140, f: 3, name: "A Blok Asansörü", type: "elevator" },
        "K3_MBGHocalar": { x: 416, y: 260, f: 3, name: "MBG Bölüm Başkanlığı", type: "academic" },
        "K3_GidaHocalar": { x: 333, y: 380, f: 3, name: "Gıda Müh. Hocaları", type: "academic" },
        "K3_AsansorB": { x: 250, y: 500, f: 3, name: "B Blok Asansörü", type: "elevator" },
        "K3_Toplanti1": { x: 416, y: 500, f: 3, name: "Toplantı Salonu 1", type: "academic" },
        "K3_Toplanti2": { x: 583, y: 500, f: 3, name: "Toplantı Salonu 2", type: "academic" },
        "K3_AsansorC": { x: 750, y: 500, f: 3, name: "C Blok Asansörü", type: "elevator" },
        "K3_Dekanlik": { x: 666, y: 380, f: 3, name: "Fakülte Dekanlığı", type: "academic" },
        "K3_Yonetim": { x: 583, y: 260, f: 3, name: "İdari Yönetim", type: "academic" }
    };

    // --- MÜKEMMEL ÜÇGEN AĞI (Sadece Kenarlar) ---
    const graph = {
        // --- ZEMİN KAT ---
        "Z_GirisA": { "Z_AsansorA": 5 }, "Z_GirisB": { "Z_AsansorB": 5 }, "Z_GirisC": { "Z_AsansorC": 5 },
        // Ring
        "Z_AsansorA": { "Z_GirisA": 5, "Z_Amfi1": 15, "Z_Kantin": 15, "K1_AsansorA": 30, "Z_Fuaye": 20 },
        "Z_Amfi1": { "Z_AsansorA": 15, "Z_Amfi2": 15 },
        "Z_Amfi2": { "Z_Amfi1": 15, "Z_AsansorB": 15 },
        "Z_AsansorB": { "Z_GirisB": 5, "Z_Amfi2": 15, "Z_OgrenciIsleri": 15, "K1_AsansorB": 30, "Z_Fuaye": 20 },
        "Z_OgrenciIsleri": { "Z_AsansorB": 15, "Z_Kutuphane": 15 },
        "Z_Kutuphane": { "Z_OgrenciIsleri": 15, "Z_AsansorC": 15 },
        "Z_AsansorC": { "Z_GirisC": 5, "Z_Kutuphane": 15, "Z_Yemekhane": 15, "K1_AsansorC": 30, "Z_Fuaye": 20 },
        "Z_Yemekhane": { "Z_AsansorC": 15, "Z_Kantin": 15 },
        "Z_Kantin": { "Z_Yemekhane": 15, "Z_AsansorA": 15 },
        "Z_Fuaye": { "Z_AsansorA": 20, "Z_AsansorB": 20, "Z_AsansorC": 20 }, // Sadece zeminde ortadan geçiş var

        // --- 1. KAT ---
        "K1_AsansorA": { "Z_AsansorA": 30, "K1_D101_104": 15, "K1_D119_120": 15, "K2_AsansorA": 30 },
        "K1_D101_104": { "K1_AsansorA": 15, "K1_D105_108": 15 },
        "K1_D105_108": { "K1_D101_104": 15, "K1_AsansorB": 15 },
        "K1_AsansorB": { "Z_AsansorB": 30, "K1_D105_108": 15, "K1_MBGLab1": 15, "K2_AsansorB": 30 },
        "K1_MBGLab1": { "K1_AsansorB": 15, "K1_MBGLab2": 15 },
        "K1_MBGLab2": { "K1_MBGLab1": 15, "K1_AsansorC": 15 },
        "K1_AsansorC": { "Z_AsansorC": 30, "K1_MBGLab2": 15, "K1_D116_118": 15, "K2_AsansorC": 30 },
        "K1_D116_118": { "K1_AsansorC": 15, "K1_D119_120": 15 },
        "K1_D119_120": { "K1_D116_118": 15, "K1_AsansorA": 15 },

        // --- 2. KAT ---
        "K2_AsansorA": { "K1_AsansorA": 30, "K2_D201_204": 15, "K2_D219_220": 15, "K3_AsansorA": 30 },
        "K2_D201_204": { "K2_AsansorA": 15, "K2_D205_208": 15 },
        "K2_D205_208": { "K2_D201_204": 15, "K2_AsansorB": 15 },
        "K2_AsansorB": { "K1_AsansorB": 30, "K2_D205_208": 15, "K2_D209_212": 15, "K3_AsansorB": 30 },
        "K2_D209_212": { "K2_AsansorB": 15, "K2_D213_215": 15 },
        "K2_D213_215": { "K2_D209_212": 15, "K2_AsansorC": 15 },
        "K2_AsansorC": { "K1_AsansorC": 30, "K2_D213_215": 15, "K2_D216_218": 15, "K3_AsansorC": 30 },
        "K2_D216_218": { "K2_AsansorC": 15, "K2_D219_220": 15 },
        "K2_D219_220": { "K2_D216_218": 15, "K2_AsansorA": 15 },

        // --- 3. KAT ---
        "K3_AsansorA": { "K2_AsansorA": 30, "K3_MBGHocalar": 15, "K3_Yonetim": 15 },
        "K3_MBGHocalar": { "K3_AsansorA": 15, "K3_GidaHocalar": 15 },
        "K3_GidaHocalar": { "K3_MBGHocalar": 15, "K3_AsansorB": 15 },
        "K3_AsansorB": { "K2_AsansorB": 30, "K3_GidaHocalar": 15, "K3_Toplanti1": 15 },
        "K3_Toplanti1": { "K3_AsansorB": 15, "K3_Toplanti2": 15 },
        "K3_Toplanti2": { "K3_Toplanti1": 15, "K3_AsansorC": 15 },
        "K3_AsansorC": { "K2_AsansorC": 30, "K3_Toplanti2": 15, "K3_Dekanlik": 15 },
        "K3_Dekanlik": { "K3_AsansorC": 15, "K3_Yonetim": 15 },
        "K3_Yonetim": { "K3_Dekanlik": 15, "K3_AsansorA": 15 }
    };

    let currentFloor = 0;
    let currentPath = [];
    let isSimulating = false;

    window.onload = () => { populateSelects(); renderFloor(currentFloor); };

    function populateSelects() {
        const start = document.getElementById('start');
        const end = document.getElementById('end');
        let groups = { 0: "", 1: "", 2: "", 3: "" };
        
        start.innerHTML = `<option value="" disabled selected>Başlangıç Konumu?</option>`;
        end.innerHTML = `<option value="" disabled selected>Hedef Konum?</option>`;

        for (const [id, data] of Object.entries(locations)) {
            groups[data.f] += `<option value="${id}">${data.name}</option>`;
        }
        
        const formatGroups = `
            <optgroup label="-- ZEMİN KAT --">${groups[0]}</optgroup>
            <optgroup label="-- 1. KAT (101-120) --">${groups[1]}</optgroup>
            <optgroup label="-- 2. KAT (201-220) --">${groups[2]}</optgroup>
            <optgroup label="-- 3. KAT (Hocalar) --">${groups[3]}</optgroup>`;
        
        start.innerHTML += formatGroups; end.innerHTML += formatGroups;
    }

    function changeFloor(floorNum) {
        if(isSimulating) return; 
        currentFloor = floorNum;
        document.querySelectorAll('.floor-tabs button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-f' + floorNum).classList.add('active');
        renderFloor(currentFloor);
        if (currentPath.length > 0) drawPathOnSvg(currentPath);
    }

    function renderFloor(floorNum) {
        const container = document.getElementById('nodes-container');
        container.innerHTML = ""; 
        for (const [id, data] of Object.entries(locations)) {
            if (data.f === floorNum) {
                let classes = "node";
                if (data.type) classes += " " + data.type;
                
                container.innerHTML += `
                    <div class="${classes}" style="left: ${data.x}px; top: ${data.y}px;" onclick="document.getElementById('end').value='${id}'"></div>
                    <div class="node-label" style="left: ${data.x}px; top: ${data.y}px;">${data.name}</div>
                `;
            }
        }
    }

    function dijkstra(startNode, endNode) {
        let dist = {}, prev = {}, unvisited = new Set(Object.keys(graph));
        for (let n in graph) dist[n] = Infinity;
        dist[startNode] = 0;
        while (unvisited.size > 0) {
            let u = null;
            for (let n of unvisited) if (u === null || dist[n] < dist[u]) u = n;
            if (u === endNode || dist[u] === Infinity) break;
            unvisited.delete(u);
            for (let neighbor in graph[u]) {
                let alt = dist[u] + graph[u][neighbor];
                if (alt < dist[neighbor]) { dist[neighbor] = alt; prev[neighbor] = u; }
            }
        }
        let path = [], curr = endNode;
        while (curr) { path.unshift(curr); curr = prev[curr]; }
        return path[0] === startNode ? path : [];
    }

    function calculateRoute() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        if (!start || !end) { alert("Lütfen listelerden seçim yapın."); return; }
        if (start === end) { alert("Hedefiniz zaten bulunduğunuz konum!"); return; }

        currentPath = dijkstra(start, end);
        changeFloor(locations[start].f); 
        generateTextDirections(currentPath);
        document.getElementById('sim-btn').style.display = 'block'; 
    }

    function drawPathOnSvg(path) {
        const svg = document.getElementById('routes');
        svg.innerHTML = ""; 
        for (let i = 0; i < path.length - 1; i++) {
            let n1 = locations[path[i]], n2 = locations[path[i+1]];
            
            if (n1.f === currentFloor && n2.f === currentFloor) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
                line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
                line.setAttribute("stroke", "var(--kgtu-green)"); 
                line.setAttribute("stroke-width", "6");
                line.setAttribute("stroke-dasharray", "12,12");
                line.setAttribute("stroke-linecap", "round");

                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                anim.setAttribute("attributeName", "stroke-dashoffset");
                anim.setAttribute("values", "24;0"); anim.setAttribute("dur", "0.8s");
                anim.setAttribute("repeatCount", "indefinite");
                line.appendChild(anim);
                svg.appendChild(line);
            }
        }
    }

    function generateTextDirections(path) {
        let html = "<b>Adım Adım Yol Tarifi:</b><br><br>";
        for (let i = 0; i < path.length - 1; i++) {
            let n1 = locations[path[i]], n2 = locations[path[i+1]];
            
            if (n1.f !== n2.f) {
                let action = n2.f > n1.f ? "yukarı çıkın ⬆️" : "aşağı inin ⬇️";
                html += `<span style="color:var(--kgtu-orange); display:block; margin:8px 0; font-weight:bold;">🏢 Asansör ile ${n2.f}. Kata ${action}.</span>`;
            } else {
                html += `• Üçgen koridordan <b>${n2.name}</b> yönüne ilerleyin.<br>`;
            }
        }
        html += `<br><span style="color:var(--kgtu-green); font-weight:bold; font-size:15px;">📍 Hedefe Ulaştınız!</span>`;
        document.getElementById('directions-text').innerHTML = html;
    }

    function startSimulation() {
        if(currentPath.length === 0 || isSimulating) return;
        isSimulating = true;
        document.getElementById('sim-btn').style.display = 'none';
        
        const avatar = document.getElementById('sim-avatar');
        avatar.style.display = 'block';
        
        let step = 0;

        function walk() {
            if (step >= currentPath.length) {
                isSimulating = false;
                setTimeout(() => { avatar.style.display = 'none'; }, 1500);
                return;
            }

            let currentNode = locations[currentPath[step]];
            
            if(currentNode.f !== currentFloor) {
                isSimulating = false; 
                changeFloor(currentNode.f);
                isSimulating = true;  
            }

            avatar.style.left = currentNode.x + 'px';
            avatar.style.top = currentNode.y + 'px';

            step++;
            setTimeout(walk, 900); 
        }

        let startNode = locations[currentPath[0]];
        changeFloor(startNode.f);
        avatar.style.transition = 'none'; 
        avatar.style.left = startNode.x + 'px';
        avatar.style.top = startNode.y + 'px';
        
        setTimeout(() => {
            avatar.style.transition = 'left 0.7s linear, top 0.7s linear'; 
            walk();
        }, 100);
    }
</script>

</body>
</html>
