<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGTÜ Merkez Bina - Gelişmiş Navigasyon</title>
    <style>
        /* --- KGTÜ KURUMSAL PREMIUM TEMA --- */
        :root {
            --bg-color: #0B1120; /* Gece Mavisi */
            --panel-bg: rgba(15, 23, 42, 0.85); /* Cam Efektli Panel */
            --kgtu-green: #10B981; /* KGTÜ Yeşili */
            --kgtu-orange: #F97316; /* KGTÜ Turuncusu */
            --border-color: rgba(16, 185, 129, 0.3);
            --text-light: #F1F5F9;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 20px; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at top right, #1e293b, #0B1120);
            color: var(--text-light);
            min-height: 100vh;
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }

        h1 { text-align: center; color: var(--kgtu-green); font-weight: 300; text-transform: uppercase; letter-spacing: 2px;}
        h1 b { color: var(--kgtu-orange); }

        /* --- KONTROL PANELİ --- */
        .controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        
        select { 
            padding: 12px; border-radius: 8px; 
            background: #1E293B; border: 1px solid var(--kgtu-green); 
            color: white; font-size: 14px; width: 250px;
        }

        .btn {
            padding: 12px 25px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-gps { background: #334155; color: var(--kgtu-orange); border: 1px solid var(--kgtu-orange); }
        .btn-gps:hover { background: var(--kgtu-orange); color: white; }
        .btn-route { background: var(--kgtu-green); color: #0B1120; }
        .btn-route:hover { box-shadow: 0 0 15px var(--kgtu-green); }

        /* --- KAT SEÇİCİ --- */
        .floor-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .floor-btn { 
            padding: 10px 20px; background: #1E293B; border: 1px solid gray; 
            color: white; border-radius: 5px; cursor: pointer; 
        }
        .floor-btn.active { background: var(--kgtu-orange); border-color: var(--kgtu-orange); font-weight: bold;}

        /* --- HARİTA ALANI --- */
        #map-container { 
            position: relative; width: 100%; height: 600px; 
            background: #0F172A; border: 2px solid var(--border-color); 
            border-radius: 15px; overflow: hidden; 
        }

        #map-bg { 
            width: 100%; height: 100%; position: absolute; opacity: 0.15;
            /* Binanın C/Üçgen şeklini temsil eden ızgara arka planı */
            background-image: linear-gradient(var(--kgtu-green) 1px, transparent 1px), linear-gradient(90deg, var(--kgtu-green) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        svg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        
        /* Noktalar */
        .node { 
            position: absolute; width: 16px; height: 16px; 
            background: var(--kgtu-green); border-radius: 50%; 
            transform: translate(-50%, -50%); border: 3px solid #0F172A; 
            cursor: pointer; transition: 0.3s; z-index: 10;
        }
        .node.special { background: var(--kgtu-orange); width: 20px; height: 20px; box-shadow: 0 0 15px var(--kgtu-orange); }
        .node.elevator { background: #3B82F6; border-radius: 4px; } /* Asansörler kare */
        
        .node-label { 
            position: absolute; font-size: 11px; background: rgba(0,0,0,0.8); 
            padding: 4px 8px; border-radius: 4px; border: 1px solid var(--kgtu-green);
            transform: translate(-50%, 15px); white-space: nowrap; z-index: 11;
        }

        /* --- YOL TARİFİ --- */
        #directions { 
            margin-top: 20px; padding: 20px; background: rgba(16, 185, 129, 0.1); 
            border-left: 4px solid var(--kgtu-green); border-radius: 8px; line-height: 1.6;
        }
        .step-floor { color: var(--kgtu-orange); font-weight: bold; margin-top: 10px; display: inline-block;}
    </style>
</head>
<body>

<div class="container">
    <h1>KGTÜ Merkez Bina <b>Navigasyon</b></h1>
    
    <div class="controls">
        <select id="start"><option value="" disabled selected>Şu an neredesin?</option></select>
        <button class="btn btn-gps" onclick="getLocation()">📍 Konumumu Bul</button>
        <select id="end"><option value="" disabled selected>Nereye gideceksin?</option></select>
        <button class="btn btn-route" onclick="calculateRoute()">Yol Tarifi Al</button>
    </div>

    <div class="floor-selector">
        <button class="floor-btn active" onclick="changeFloor(0)" id="btn-f0">Zemin Kat (Girişler)</button>
        <button class="floor-btn" onclick="changeFloor(1)" id="btn-f1">1. Kat (Neo Cafe / MBG)</button>
        <button class="floor-btn" onclick="changeFloor(2)" id="btn-f2">2. Kat (Neo Mutfak)</button>
    </div>

    <div id="map-container">
        <div id="map-bg"></div>
        <svg id="routes"></svg>
        <div id="nodes-container"></div>
    </div>

    <div id="directions">Lütfen başlangıç ve hedef noktasını seçip rotayı çizin.</div>
</div>

<script>
    // --- 1. DEVASA KGTÜ VERİTABANI (Katlar, Koordinatlar ve Türler) ---
    // f: 0 (Zemin), f: 1 (1. Kat), f: 2 (2. Kat)
    const locations = {
        // --- ZEMİN KAT (f: 0) ---
        "Z_AnaGiris": { x: 550, y: 550, f: 0, name: "Ana Giriş Kapısı", type: "special" },
        "Z_GirisA": { x: 250, y: 480, f: 0, name: "A Blok Giriş" },
        "Z_GirisC": { x: 850, y: 480, f: 0, name: "C Blok Giriş" },
        "Z_Fuaye": { x: 550, y: 450, f: 0, name: "Ana Fuaye Alanı" },
        "Z_OgrenciIsleri": { x: 650, y: 450, f: 0, name: "Öğrenci İşleri" },
        "Z_AsansorMerkez": { x: 550, y: 350, f: 0, name: "Zemin Kat Ana Asansör", type: "elevator" },
        "Z_AsansorA": { x: 250, y: 350, f: 0, name: "A Blok Asansörü", type: "elevator" },
        "Z_AsansorC": { x: 850, y: 350, f: 0, name: "C Blok Asansörü", type: "elevator" },
        "Z_Kutuphane": { x: 750, y: 350, f: 0, name: "Merkez Kütüphane" },
        "Z_BuyukKonferans": { x: 350, y: 350, f: 0, name: "Büyük Konferans Salonu" },

        // --- 1. KAT (f: 1) ---
        "K1_AsansorMerkez": { x: 550, y: 350, f: 1, name: "1. Kat Ana Asansör", type: "elevator" },
        "K1_NeoCafe": { x: 550, y: 250, f: 1, name: "Neo Cafe (Orta Bağlantı)", type: "special" }, // İstediğin Orta Bağlantı
        "K1_AsansorA": { x: 250, y: 350, f: 1, name: "1. Kat A Asansörü", type: "elevator" },
        "K1_KoridorA": { x: 250, y: 250, f: 1, name: "1. Kat A Koridoru" },
        "K1_MBG_Lab1": { x: 150, y: 250, f: 1, name: "Moleküler Biyoloji Lab 1" }, // Bölümün
        "K1_MBG_Lab2": { x: 150, y: 150, f: 1, name: "Moleküler Biyoloji Lab 2" },
        "K1_AsansorC": { x: 850, y: 350, f: 1, name: "1. Kat C Asansörü", type: "elevator" },
        "K1_KoridorC": { x: 850, y: 250, f: 1, name: "1. Kat C Koridoru" },
        "K1_DerslikC101": { x: 950, y: 250, f: 1, name: "C-101 Dersliği" },

        // --- 2. KAT (f: 2) ---
        "K2_AsansorMerkez": { x: 550, y: 350, f: 2, name: "2. Kat Ana Asansör", type: "elevator" },
        "K2_NeoMutfak": { x: 550, y: 250, f: 2, name: "Neo Mutfak (Orta Bağlantı)", type: "special" }, // İstediğin Orta Bağlantı
        "K2_AsansorA": { x: 250, y: 350, f: 2, name: "2. Kat A Asansörü", type: "elevator" },
        "K2_KoridorA": { x: 250, y: 250, f: 2, name: "2. Kat A Koridoru" },
        "K2_AkademikOfis": { x: 150, y: 250, f: 2, name: "MBG Akademik Ofisler" },
        "K2_AsansorC": { x: 850, y: 350, f: 2, name: "2. Kat C Asansörü", type: "elevator" },
        "K2_KoridorC": { x: 850, y: 250, f: 2, name: "2. Kat C Koridoru" },
        "K2_BilgisayarLab": { x: 950, y: 250, f: 2, name: "Bilgisayar Laboratuvarı" }
    };

    // --- 2. YOLLAR VE BAĞLANTILAR (Merdiven ve Asansörler dahil) ---
    const graph = {
        // Zemin İçi
        "Z_AnaGiris": { "Z_Fuaye": 10 },
        "Z_GirisA": { "Z_AsansorA": 15 },
        "Z_GirisC": { "Z_AsansorC": 15 },
        "Z_Fuaye": { "Z_AnaGiris": 10, "Z_OgrenciIsleri": 15, "Z_AsansorMerkez": 20, "Z_AsansorA": 35, "Z_AsansorC": 35 },
        "Z_OgrenciIsleri": { "Z_Fuaye": 15 },
        "Z_AsansorMerkez": { "Z_Fuaye": 20, "Z_BuyukKonferans": 25, "Z_Kutuphane": 25, "K1_AsansorMerkez": 30 }, // Zemin'den 1'e çıkış
        "Z_BuyukKonferans": { "Z_AsansorMerkez": 25, "Z_AsansorA": 15 },
        "Z_Kutuphane": { "Z_AsansorMerkez": 25, "Z_AsansorC": 15 },
        "Z_AsansorA": { "Z_GirisA": 15, "Z_Fuaye": 35, "Z_BuyukKonferans": 15, "K1_AsansorA": 30 },
        "Z_AsansorC": { "Z_GirisC": 15, "Z_Fuaye": 35, "Z_Kutuphane": 15, "K1_AsansorC": 30 },

        // 1. Kat İçi
        "K1_AsansorMerkez": { "Z_AsansorMerkez": 30, "K1_NeoCafe": 20, "K2_AsansorMerkez": 30 }, // 1'den 2'ye çıkış
        "K1_NeoCafe": { "K1_AsansorMerkez": 20, "K1_KoridorA": 40, "K1_KoridorC": 40 }, // Orta kafeden yanlara geçiş
        "K1_AsansorA": { "Z_AsansorA": 30, "K1_KoridorA": 15, "K2_AsansorA": 30 },
        "K1_KoridorA": { "K1_AsansorA": 15, "K1_NeoCafe": 40, "K1_MBG_Lab1": 15 },
        "K1_MBG_Lab1": { "K1_KoridorA": 15, "K1_MBG_Lab2": 15 },
        "K1_MBG_Lab2": { "K1_MBG_Lab1": 15 },
        "K1_AsansorC": { "Z_AsansorC": 30, "K1_KoridorC": 15, "K2_AsansorC": 30 },
        "K1_KoridorC": { "K1_AsansorC": 15, "K1_NeoCafe": 40, "K1_DerslikC101": 15 },
        "K1_DerslikC101": { "K1_KoridorC": 15 },

        // 2. Kat İçi
        "K2_AsansorMerkez": { "K1_AsansorMerkez": 30, "K2_NeoMutfak": 20 },
        "K2_NeoMutfak": { "K2_AsansorMerkez": 20, "K2_KoridorA": 40, "K2_KoridorC": 40 },
        "K2_AsansorA": { "K1_AsansorA": 30, "K2_KoridorA": 15 },
        "K2_KoridorA": { "K2_AsansorA": 15, "K2_NeoMutfak": 40, "K2_AkademikOfis": 15 },
        "K2_AkademikOfis": { "K2_KoridorA": 15 },
        "K2_AsansorC": { "K1_AsansorC": 30, "K2_KoridorC": 15 },
        "K2_KoridorC": { "K2_AsansorC": 15, "K2_NeoMutfak": 40, "K2_BilgisayarLab": 15 },
        "K2_BilgisayarLab": { "K2_KoridorC": 15 }
    };

    let currentFloor = 0; // Başlangıçta Zemin Kat açık
    let currentPath = []; // Çizilen rota hafızası

    window.onload = () => {
        populateSelects();
        renderFloor(currentFloor);
    };

    function populateSelects() {
        const start = document.getElementById('start');
        const end = document.getElementById('end');
        for (const [id, data] of Object.entries(locations)) {
            // Dropdownlarda kat bilgisini de göster
            let floorText = data.f === 0 ? "(Zemin)" : data.f === 1 ? "(1. Kat)" : "(2. Kat)";
            start.innerHTML += `<option value="${id}">${data.name} ${floorText}</option>`;
            end.innerHTML += `<option value="${id}">${data.name} ${floorText}</option>`;
        }
    }

    // --- GÜÇLENDİRİLMİŞ KONUM (GPS) FONKSİYONU ---
    function getLocation() {
        const dirPanel = document.getElementById('directions');
        dirPanel.innerHTML = "GPS Konumu aranıyor... Tarayıcı izinlerini kontrol edin.";
        dirPanel.style.color = "var(--kgtu-orange)";

        if (!navigator.geolocation) {
            alert("Tarayıcın GPS desteklemiyor!");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                // Konum izni alındı! Ama kullanıcı şu an kampüste mi evde mi?
                // Hata verip sistemi kilitlemek yerine "Akıllı Test Modu" çalıştırıyoruz:
                alert("Konum sinyali alındı! (Şu an kampüs dışındaysanız test modu devreye girer ve Ana Giriş varsayılır)");
                
                // Simülasyon: Kullanıcıyı Zemin Kat Ana Giriş'e koy.
                document.getElementById('start').value = "Z_AnaGiris";
                changeFloor(0);
                
                dirPanel.innerHTML = "Konum başarılı. <b>Ana Giriş Kapısı</b>ndesiniz. Şimdi hedef seçin.";
                dirPanel.style.color = "var(--text-light)";
            },
            (error) => {
                alert("Konum okunamadı. Tarayıcının konum izni engellenmiş olabilir veya dosya lokalde (file://) çalışıyor. Lütfen başlangıç noktasını listeden kendin seç.");
                dirPanel.innerHTML = "Lütfen başlangıç ve hedef noktasını seçip rotayı çizin.";
                dirPanel.style.color = "var(--text-light)";
            },
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
    }

    // --- KAT DEĞİŞTİRME MANTIĞI ---
    function changeFloor(floorNum) {
        currentFloor = floorNum;
        
        // Buton renklerini güncelle
        document.querySelectorAll('.floor-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-f' + floorNum).classList.add('active');

        renderFloor(currentFloor);
        if (currentPath.length > 0) drawPathOnSvg(currentPath);
    }

    function renderFloor(floorNum) {
        const container = document.getElementById('nodes-container');
        container.innerHTML = ""; // Ekranı temizle
        
        for (const [id, data] of Object.entries(locations)) {
            // SADECE aktif katın noktalarını ekrana çiz
            if (data.f === floorNum) {
                let extraClass = data.type ? data.type : "";
                container.innerHTML += `
                    <div class="node ${extraClass}" style="left: ${data.x}px; top: ${data.y}px;"></div>
                    <div class="node-label" style="left: ${data.x}px; top: ${data.y}px;">${data.name}</div>
                `;
            }
        }
    }

    // --- DİJKSTRA ALGORİTMASI ---
    function dijkstra(startNode, endNode) {
        let dist = {}, prev = {}, unvisited = new Set(Object.keys(graph));
        for (let n in graph) dist[n] = Infinity;
        dist[startNode] = 0;

        while (unvisited.size > 0) {
            let u = null;
            for (let n of unvisited) {
                if (u === null || dist[n] < dist[u]) u = n;
            }
            if (u === endNode || dist[u] === Infinity) break;
            unvisited.delete(u);

            for (let neighbor in graph[u]) {
                let alt = dist[u] + graph[u][neighbor];
                if (alt < dist[neighbor]) {
                    dist[neighbor] = alt;
                    prev[neighbor] = u;
                }
            }
        }
        let path = [], curr = endNode;
        while (curr) { path.unshift(curr); curr = prev[curr]; }
        return path[0] === startNode ? path : [];
    }

    function calculateRoute() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;

        if (!start || !end) { alert("Başlangıç ve Bitiş seçmelisin!"); return; }
        if (start === end) { alert("Zaten buradasın!"); return; }

        currentPath = dijkstra(start, end);
        
        // Kullanıcıyı otomatik olarak başlangıç noktasına ait kata götür
        const startFloor = locations[start].f;
        changeFloor(startFloor); 

        // Metin talimatlarını yaz
        generateTextDirections(currentPath);
    }

    function drawPathOnSvg(path) {
        const svg = document.getElementById('routes');
        svg.innerHTML = ""; // Eski çizgileri sil

        for (let i = 0; i < path.length - 1; i++) {
            let n1 = locations[path[i]];
            let n2 = locations[path[i+1]];

            // Sadece şu anki katta olan yatay yürüyüş çizgilerini çiz
            if (n1.f === currentFloor && n2.f === currentFloor) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
                line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
                line.setAttribute("stroke", "var(--kgtu-green)"); 
                line.setAttribute("stroke-width", "5");
                line.setAttribute("stroke-dasharray", "10,10");

                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                anim.setAttribute("attributeName", "stroke-dashoffset");
                anim.setAttribute("values", "20;0"); anim.setAttribute("dur", "1s");
                anim.setAttribute("repeatCount", "indefinite");
                line.appendChild(anim);

                svg.appendChild(line);
            }
        }
    }

    function generateTextDirections(path) {
        let html = "<b>Yol Tarifi:</b><br><br><ol>";
        let currentFloorTracking = locations[path[0]].f;

        for (let i = 0; i < path.length - 1; i++) {
            let node1 = locations[path[i]];
            let node2 = locations[path[i+1]];

            if (node1.f !== node2.f) {
                // Kat değiştirme uyarısı
                let action = node2.f > node1.f ? "yukarı çıkın" : "aşağı inin";
                html += `<span class="step-floor">🔼 Asansör/Merdiven ile ${node2.f}. Kata ${action}.</span><br><br>`;
                currentFloorTracking = node2.f;
            } else {
                html += `<li><b>${node1.name}</b> noktasından <b>${node2.name}</b> yönüne ilerleyin.</li>`;
            }
        }
        html += `</ol><br><b style="color:var(--kgtu-orange)">🏁 Hedefe Ulaştınız!</b>`;
        
        // Katlar arası geçiş varsa kullanıcıya ufak bir hatırlatma yap
        if (locations[path[path.length-1]].f !== locations[path[0]].f) {
            html += `<br><br><i>Not: Hedefiniz farklı bir katta. Haritada diğer katı görmek için üstteki butonlara tıklayın.</i>`;
        }

        document.getElementById('directions').innerHTML = html;
    }
</script>

</body>
</html>
